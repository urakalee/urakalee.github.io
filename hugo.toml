baseURL = "https://life.urakalee.me/"
languageCode = "zh-cn"
title = "Binary Life"
theme = "PaperMod"
paginate = 10

[params]
  author = "Uraka Lee"
  description = "诗人 方法论者 喝汤族 微微爸"
  defaultTheme = "auto"
  showShareButtons = false
  showReadingTime = true
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  showToc = true

  [params.homeInfoParams]
    Title = "Binary Life"
    Content = "诗人 · 方法论者 · 喝汤族 · 微微爸"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = false
