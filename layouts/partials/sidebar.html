{{- with site.Params.friendLinks }}
<div class="sidebar-section">
  <h3 class="sidebar-title">链接</h3>
  <ul class="friend-links">
    {{- range . }}
    <li>
      {{- if .qrcode }}
      <div class="friend-qr-wrap">
        <span class="friend-qr-trigger">
          {{ .name }}
          <svg class="qr-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4" rx="0"/><line x1="22" y1="14" x2="22" y2="14.01"/><line x1="22" y1="22" x2="22" y2="22.01"/><line x1="18" y1="22" x2="18" y2="22.01"/><line x1="22" y1="18" x2="22" y2="18.01"/></svg>
        </span>
        <div class="friend-qr-popup">
          <img src="{{ .qrcode }}" alt="{{ .name }} 二维码" />
          {{- with .desc }}
          <span class="friend-qr-desc">{{ . }}</span>
          {{- end }}
        </div>
      </div>
      {{- else }}
      <a href="{{ .url }}" target="_blank" rel="noopener noreferrer">
        {{ .name }}
      </a>
      {{- end }}
      {{- if not .qrcode }}
      {{- with .desc }}
      <span class="friend-desc">{{ . }}</span>
      {{- end }}
      {{- end }}
    </li>
    {{- end }}
  </ul>
</div>
{{- end }}
